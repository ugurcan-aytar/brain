version: 2

project_name: brain

before:
  hooks:
    - go mod tidy
    - go test ./...

builds:
  - id: brain
    main: ./cmd/brain
    binary: brain
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X github.com/ugurcan-aytar/brain/internal/version.Current={{.Version}}

archives:
  - id: brain
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - LICENSE
      - README.md

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-next"

# Homebrew tap — publishes a cask to a separate repo on every release so
# macOS/Linux users can `brew install ugurcan-aytar/brain/brain`. The tap
# repo (homebrew-brain) must exist and the GitHub token running goreleaser
# needs push access to it.
homebrew_casks:
  - name: brain
    binaries:
      - brain
    repository:
      owner: ugurcan-aytar
      name: homebrew-brain
      branch: main
      # PAT with write access to the tap repo. Needed because the
      # default GITHUB_TOKEN is scoped to the current repo only.
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Casks
    # Strip the macOS Gatekeeper quarantine flag after install.
    # Without this, Apple blocks the unsigned binary with a
    # "could not verify brain is free of malware" dialog on first
    # run and the user has to run `xattr -dr com.apple.quarantine`
    # manually. Proper notarization needs an Apple Developer ID
    # ($99/yr) — not worth it for a side project.
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/brain"]
          end
    homepage: https://github.com/ugurcan-aytar/brain
    description: Conversational knowledge base over your local notes
    license: MIT
    # qmd ships via npm (not brew), so we surface it in the caveats
    # below. node is a formula (not a cask) — users need it to run
    # `npm install -g @tobilu/qmd`.
    dependencies:
      - formula: node
    caveats: |
      brain also needs qmd (the retrieval engine) on your PATH:

        npm install -g @tobilu/qmd

      And at least one LLM backend — either ANTHROPIC_API_KEY,
      OPENAI_API_KEY, or the `claude` CLI signed in.

      Run `brain doctor` to verify everything's wired up.

# Linux packages — .deb, .rpm, .apk generated via goreleaser's nfpm
# integration. Lets Debian/Ubuntu users do `sudo apt install ./brain.deb`
# and Fedora/RHEL users do `sudo dnf install ./brain.rpm` directly off
# the release artifacts. No apt repo server required.
nfpms:
  - id: brain
    package_name: brain
    vendor: ugurcan-aytar
    homepage: https://github.com/ugurcan-aytar/brain
    maintainer: Ugurcan Aytar <ugurcan.aytar@gmail.com>
    description: |
      Conversational knowledge base over your local notes.
      brain turns a folder of markdown and text files into a queryable
      knowledge base, grounding answers in the chunks it retrieves
      from your notes.
    license: MIT
    formats:
      - deb
      - rpm
      - apk
    bindir: /usr/local/bin
    section: utils
    priority: optional

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "Merge pull request"
      - "Merge branch"

release:
  github:
    owner: ugurcan-aytar
    name: brain
  draft: false
  prerelease: auto
  header: |
    ## brain {{ .Tag }}

    **Homebrew (macOS & Linux)**:
    ```sh
    brew install ugurcan-aytar/brain/brain
    ```

    **Debian / Ubuntu**:
    ```sh
    sudo apt install ./brain_{{ .Version }}_amd64.deb
    ```

    **Fedora / RHEL**:
    ```sh
    sudo dnf install ./brain_{{ .Version }}_x86_64.rpm
    ```

    **Shell installer** (any POSIX shell):
    ```sh
    curl -sSfL https://raw.githubusercontent.com/ugurcan-aytar/brain/main/install.sh | sh
    ```

    Or grab a prebuilt archive below and drop the `brain` binary into `/usr/local/bin`.
